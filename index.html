<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Career Calendar Draft</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🏁 F1 Career Calendar Draft</h1>

    <section id="setup-screen">

        <h2>Driver Setup</h2>

        <input
            type="text"
            id="player1-name"
            placeholder="Player 1 Name">

        <input
            type="text"
            id="player2-name"
            placeholder="Player 2 Name">



<div class="season-selector">
    <div
        class="season-card selected"
        data-length="10"
        onclick="selectSeason(10, this)">

        <div class="season-title">
            10 Race Season
        </div>

        <div class="season-subtitle">
            Quick Championship
        </div>
        <div class="season-picks">
        6 Picks Per Driver
        </div>
    </div>

    <div
        class="season-card"
        data-length="16"
        onclick="selectSeason(16, this)">

        <div class="season-title">
            16 Race Season
        </div>

        <div class="season-subtitle">
            Extended Campaign
        </div>
        <div class="season-picks">
        9 Picks Per Driver
        </div>

    </div>
</div>        
        <button onclick="startDraft()">
            Start Draft
        </button>

    </section>

    <section id="draft-screen" class="hidden">

        <h2 id="draft-title"></h2>

        <p class="counter">
          <span id="selection-count">0</span>
          /
         <span id="selection-limit">6</span>
         Selected
        </p>

        <div id="track-grid" class="track-grid"></div>

        <button onclick="submitDraft()">
            Continue
        </button>

    </section>

    <section id="handoff-screen" class="hidden">

        <h2>Pass Device</h2>

        <p id="handoff-text"></p>

        <button onclick="beginPlayer2()">
            Begin Draft
        </button>

    </section>

    <section id="results-screen" class="hidden">

        <h2>Generated Season</h2>

        <div class="legend">
            <span>🤝 Shared Pick</span>
            <span>👤 Player 1</span>
            <span>👤 Player 2</span>
            <span>🎲 FIA Selection <br> (Only if there were not enough tracks to pick from)</span>
        </div>

        <div id="calendar"></div>

        <div class="button-row">

            <button onclick="generateSeason()">
                🎲 Re-roll
            </button>

            <button onclick="location.reload()">
                🔄 New Draft
            </button>

        </div>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Career Calendar Draft</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🏁 F1 Career Calendar Draft</h1>

    <div id="nameScreen">
        <h2>Players</h2>

        <input id="player1Name" placeholder="Player 1 Name">
        <input id="player2Name" placeholder="Player 2 Name">

        <button onclick="startDraft()">
            Start Draft
        </button>
    </div>

    <div id="draftScreen" class="hidden">
        <h2 id="draftTitle"></h2>

        <p>
            Select exactly 5 tracks
        </p>

        <p>
            Selected:
            <span id="selectionCount">0</span>/5
        </p>

        <div id="trackGrid" class="track-grid"></div>

        <button onclick="submitDraft()">
            Continue
        </button>
    </div>

    <div id="handoffScreen" class="hidden">
        <h2>Pass Device</h2>

        <p>
            Hand the device to the next player.
        </p>

        <button onclick="beginPlayer2()">
            Continue
        </button>
    </div>

    <div id="resultScreen" class="hidden">

        <h2>Generated Season</h2>

        <div class="legend">
            <div>🤝 Shared Pick</div>
            <div>👤 Player 1 Pick</div>
            <div>👤 Player 2 Pick</div>
        </div>

        <div id="calendar"></div>

        <div class="buttons">

            <button onclick="generateSeason()">
                🎲 Re-roll
            </button>

            <button onclick="location.reload()">
                🔄 New Draft
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
